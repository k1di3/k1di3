<svg xmlns="http://www.w3.org/2000/svg" width="760" height="540" viewBox="0 0 760 540" role="img" aria-labelledby="title desc">
  <title id="title">JavaScript prototype inheritance diagram</title>
  <desc id="desc">A top object prototype chain shows existingObject with propertyA and propertyB pointing to myObject with propertyC below.</desc>
  <defs>
    <linearGradient id="boxTop" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#3152d8"/>
      <stop offset="100%" stop-color="#233eaf"/>
    </linearGradient>
    <linearGradient id="boxBottom" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#1f86ff"/>
      <stop offset="100%" stop-color="#1362db"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.25"/>
    </filter>
    <style>
      .label { fill: #ffffff; font-family: Arial, Helvetica, sans-serif; font-weight: 700; }
      .small { fill: #ffffff; font-family: Arial, Helvetica, sans-serif; font-size: 22px; font-weight: 700; }
      .tiny { fill: #ffffff; font-family: Arial, Helvetica, sans-serif; font-size: 20px; }
    </style>
  </defs>

  <rect width="760" height="540" rx="18" fill="#f5f7fb"/>

  <rect x="210" y="42" width="340" height="122" rx="18" fill="url(#boxTop)" stroke="#1a2d7c" stroke-width="5" filter="url(#shadow)"/>
  <text x="380" y="88" text-anchor="middle" class="label" font-size="38">existingObject</text>
  <text x="380" y="127" text-anchor="middle" class="small">propertyA</text>
  <text x="380" y="155" text-anchor="middle" class="small">propertyB</text>

  <line x1="380" y1="164" x2="380" y2="360" stroke="#2b2b8f" stroke-width="5" stroke-dasharray="12 12"/>
  <polygon points="380,372 366,350 394,350" fill="#2b2b8f"/>
  <text x="195" y="272" class="tiny" fill="#24326f">is prototype of</text>

  <rect x="210" y="378" width="340" height="122" rx="18" fill="url(#boxBottom)" stroke="#0f4aa5" stroke-width="5" filter="url(#shadow)"/>
  <text x="380" y="424" text-anchor="middle" class="label" font-size="38">myObject</text>
  <text x="380" y="468" text-anchor="middle" class="small">propertyC</text>
</svg>