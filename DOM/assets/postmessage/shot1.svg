<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <rect width="100%" height="100%" fill="#11321a" />
  <!-- outer white frame like screenshot -->
  <rect x="40" y="80" width="1120" height="560" rx="10" fill="#f6f7f8" />
  <!-- inner dark panel -->
  <rect x="72" y="116" width="1064" height="488" rx="8" fill="#111827" />

  <text x="104" y="156" fill="#dbe9ef" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Basic postMessage listener</text>

  <!-- code lines -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, 'Roboto Mono', monospace" font-size="16" fill="#9fb1c9">
    <text x="124" y="196">window.addEventListener('message', e =&gt; {</text>
    <text x="124" y="224">  console.log(e.data)</text>
    <text x="124" y="252">})</text>
  </g>

  <!-- faint horizontal scanlines to mimic screenshot texture -->
  <g opacity="0.03" stroke="#ffffff">
    <!-- draw many horizontal lines -->
    <defs>
      <pattern id="lines" width="1" height="6" patternUnits="userSpaceOnUse">
        <path d="M0 0 L1 0" stroke-width="1" />
      </pattern>
    </defs>
    <rect x="72" y="116" width="1064" height="488" fill="url(#lines)" />
  </g>
</svg>
