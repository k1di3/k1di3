<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <rect width="100%" height="100%" fill="#11321a" />
  <rect x="40" y="80" width="1120" height="560" rx="10" fill="#f6f7f8" />
  <rect x="72" y="116" width="1064" height="488" rx="8" fill="#ffffff" />
  <text x="112" y="168" fill="#0b2533" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Example postMessage</text>
  <g font-family="ui-monospace, Menlo, Monaco, monospace" font-size="18" fill="#0b2533">
    <text x="132" y="212">window.addEventListener(</text>
    <text x="132" y="244">'message',</text>
    <text x="132" y="276">(event) =&gt; {</text>
    <text x="156" y="308">if (event.origin != "https://trustfoundry.net") return;</text>
    <text x="156" y="340">let message = event.data;</text>
    <text x="156" y="372">eval(message);</text>
    <text x="132" y="404">},</text>
    <text x="132" y="436">false,</text>
    <text x="132" y="468">);</text>
  </g>
</svg>
