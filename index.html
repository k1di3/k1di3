<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Main - BountyDex Hub</title>
  <meta name="description" content="Pagina principal con acceso a BountyDex y al research de DOM.">
  <link rel="stylesheet" href="style.css">
  <style>
    .hub-wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
    }

    .hub-title {
      font-family: 'Orbitron', monospace;
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      color: var(--text-green);
      letter-spacing: 0.08em;
      margin-bottom: 0.8rem;
      text-transform: uppercase;
    }

    .hub-sub {
      color: var(--text-dim);
      font-size: 0.9rem;
      margin-bottom: 2rem;
      max-width: 760px;
      line-height: 1.5;
    }

    .hub-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 1.4rem;
    }

    .hub-link {
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .hub-card-copy {
      font-size: 0.8rem;
      color: rgba(242,255,234,0.9);
      line-height: 1.5;
      margin: 0.7rem 0 1rem;
      min-height: 3.2em;
    }

    .hub-go {
      display: inline-block;
      background: var(--text-green);
      color: var(--bg-dark);
      padding: 0.45rem 0.75rem;
      font-family: 'Orbitron', monospace;
      font-size: 0.74rem;
      letter-spacing: 0.07em;
      border: 1px solid var(--border-dim);
    }

    @media (max-width: 768px) {
      .hub-wrap {
        padding: 1.2rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <a class="logo" href="./">
        <div>
          <div class="logo-text">MAIN</div>
          <div class="logo-sub">Entry Point</div>
        </div>
      </a>
      <div class="header-stats">
        <div class="stat-pill">SECCIONES<span>2</span></div>
      </div>
    </div>
  </header>

  <main class="hub-wrap">
    <h1 class="hub-title">Hub</h1>

    <section class="hub-grid">
      <a class="hub-link" href="./bountydex/" aria-label="Ir a BountyDex">
        <article class="vuln-card found">
          <span class="card-id">#01</span>
          <div class="card-codename">BOUNTYDEX</div>
          <div class="card-name">Bug Bounty Vulnerability Registry</div>
          <p class="hub-card-copy">Bugbounty writeups</p>
          <span class="hub-go">BOUNTYDEX</span>
        </article>
      </a>

      <a class="hub-link" href="./DOM/" aria-label="Ir a research DOM">
        <article class="vuln-card not-found">
          <span class="card-id">#02</span>
          <div class="card-codename">Hacking the DOM</div>
          <div class="card-name">Client-Side Attack Surface</div>
          <p class="hub-card-copy">Deep dive into more advance DOM hacking techniques.</p>
          <span class="hub-go">DOM </span>
        </article>
      </a>
    </section>
  </main>
</body>
</html>
